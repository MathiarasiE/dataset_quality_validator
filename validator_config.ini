# CI/CD Configuration for Dataset Validator
# Define minimum quality score threshold and other validation settings

[validation]
# Minimum quality score (0-100) — pipeline fails if dataset score is below this
min_quality_score = 70

# Email alerts (optional)
# alert_email = team@example.com

[checks]
# Configure which checks to run (can disable certain checks if needed)
enable_missing_values = true
enable_duplicates = true
enable_data_types = true
enable_knn_outliers = true
enable_kmeans_distribution = true
enable_label_consistency = true
enable_distribution_drift = true

[severity]
# Define severity levels for different issue types
high_severity_threshold = 20
medium_severity_threshold = 10
